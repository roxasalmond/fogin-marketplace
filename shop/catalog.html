<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop All Products — Fogin Vape Marketplace</title>
  <meta name="description" content="Browse vape products from verified vendors. Pod systems, mods, e-liquids, and accessories.">
  <!-- Styles -->
  <link rel="stylesheet" href="/fogin-shared/css/main-marketplace.css">
</head>
<body>

  <!-- ─── NAVBAR ─── -->
  <div id="navbar-placeholder"></div>

  <!-- ─── MAIN ─── -->
  <main class="catalog-page">

    <!-- Breadcrumb -->
    <div class="catalog-breadcrumb">
      <div class="section-container">
        <nav class="breadcrumb" aria-label="Breadcrumb">
          <a href="/fogin-marketplace/index.html" class="breadcrumb__link">Home</a>
          <span class="breadcrumb__sep">/</span>
          <span class="breadcrumb__current">All Products</span>
        </nav>
      </div>
    </div>

    <div class="catalog-layout section-container">

      <!-- ─── SIDEBAR ─── -->
      <aside class="catalog-sidebar" id="catalog-sidebar">

        <div class="sidebar-section">
          <h3 class="sidebar-section__title">Categories</h3>
          <ul class="sidebar-filter-list" id="category-filters">
            <!-- Rendered by JS -->
          </ul>
        </div>

        <div class="sidebar-section">
          <h3 class="sidebar-section__title">Price Range</h3>
          <div class="price-range">
            <div class="price-range__inputs">
              <div class="price-range__field">
                <label for="price-min">Min</label>
                <input type="number" id="price-min" class="price-range__input" placeholder="₱0" min="0">
              </div>
              <span class="price-range__dash">—</span>
              <div class="price-range__field">
                <label for="price-max">Max</label>
                <input type="number" id="price-max" class="price-range__input" placeholder="₱50,000" min="0">
              </div>
            </div>
            <button class="price-range__apply btn btn--secondary" id="apply-price">Apply</button>
          </div>
        </div>

        <div class="sidebar-section">
          <h3 class="sidebar-section__title">Availability</h3>
          <label class="sidebar-check">
            <input type="checkbox" id="in-stock-only"> In Stock Only
          </label>
          <label class="sidebar-check">
            <input type="checkbox" id="sale-only"> On Sale
          </label>
        </div>

        <button class="btn btn--secondary btn--block" id="clear-filters">
          Clear All Filters
        </button>

      </aside>

      <!-- ─── CATALOG MAIN ─── -->
      <div class="catalog-main">

        <!-- Toolbar -->
        <div class="catalog-toolbar">
          <div class="catalog-toolbar__left">
            <button class="btn btn--secondary btn--sm catalog-filter-toggle" id="filter-toggle">
              <svg viewBox="0 0 20 20" fill="currentColor" width="16" height="16">
                <path fill-rule="evenodd" d="M2.628 1.601C5.028 1.206 7.49 1 10 1s4.973.206 7.372.601a.75.75 0 01.628.74v2.288a2.25 2.25 0 01-.659 1.59l-4.682 4.683a2.25 2.25 0 00-.659 1.59v3.037c0 .684-.31 1.33-.844 1.757l-1.937 1.55A.75.75 0 018 18.25v-5.757a2.25 2.25 0 00-.659-1.591L2.659 6.22A2.25 2.25 0 012 4.629V2.34a.75.75 0 01.628-.74z" clip-rule="evenodd"/>
              </svg>
              Filters
            </button>
            <p class="catalog-result-count" id="result-count">Showing <strong>0</strong> products</p>
          </div>

          <div class="catalog-toolbar__right">
            <input
              type="search"
              id="catalog-search"
              class="catalog-toolbar__search"
              placeholder="Search products..."
              autocomplete="off"
            >
            <div class="sort-select-wrap">
              <label for="sort-select" class="sr-only">Sort by</label>
              <select class="sort-select" id="sort-select">
                <option value="popular">Most Popular</option>
                <option value="newest">Newest First</option>
                <option value="price-asc">Price: Low to High</option>
                <option value="price-desc">Price: High to Low</option>
              </select>
            </div>
          </div>
        </div>

        <!-- Brand filter bar -->
        <div class="catalog-brand-bar" id="brand-bar">
          <!-- Rendered by JS -->
        </div>

        <!-- Product grid -->
        <div class="catalog-product-grid" id="catalog-grid">
          <!-- Rendered by JS -->
        </div>

        <!-- Pagination -->
        <div class="pagination" id="catalog-pagination"></div>

      </div>
    </div>
  </main>

  <!-- ─── FOOTER ─── -->
  <footer id="footer-placeholder"></footer>

  <script type="module" src="/fogin-marketplace/js/init.js"></script>
  <script type="module" src="/fogin-marketplace/js/shop/catalog.js"></script>
</body>
</html>
